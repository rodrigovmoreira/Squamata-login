version: '3.8'

services:
  # 🔐 Backend API
  squamata-login-backend:
    build:
      context: ./
      dockerfile: ./packages/backend/Dockerfile
    container_name: squamata-login-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
      - NODE_ENV=production
      # Conexão direta com o Optiplex 3010
      - MONGO_URI=mongodb://calango-inc-server-db:27018/squamata_login_db
    networks:
      - squamata-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/v1/auth/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # 🎨 Frontend
  squamata-login-frontend:
    build:
      context: ./
      dockerfile: ./packages/frontend/Dockerfile
      args:
        # Injeção das rotas públicas para o navegador do cliente
        - VITE_API_URL=http://calango-inc-appserver:3001/api/v1
        - VITE_CALANGO_FOOD_URL=http://calango-inc-appserver:5173
    container_name: squamata-login-frontend
    restart: unless-stopped
    ports:
      - "5174:5174"
    depends_on:
      squamata-login-backend:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - squamata-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5174/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  squamata-network:
    driver: bridge