version: '3.8'

services:
  # 🗄️ MongoDB Database
  mongo:
    image: mongo:7-alpine
    container_name: squamata-login-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: squamata_login_db
    networks:
      - squamata-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 🔐 Backend API
  squamata-login-backend:
    build:
      context: ./
      dockerfile: ./packages/backend/Dockerfile
    container_name: squamata-login-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      - PORT=3001
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/squamata_login_db
    networks:
      - squamata-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/v1/auth/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # 🎨 Frontend
  squamata-login-frontend:
    build:
      context: ./
      dockerfile: ./packages/frontend/Dockerfile
    container_name: squamata-login-frontend
    restart: unless-stopped
    ports:
      - "5174:5174"
    depends_on:
      squamata-login-backend:
        condition: service_healthy
    env_file:
      - .env.docker
    networks:
      - squamata-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5174/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  squamata-network:
    driver: bridge

volumes:
  mongo_data:
    driver: local